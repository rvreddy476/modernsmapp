services:
  # ─── Infrastructure ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${IDENTITY_POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${IDENTITY_POSTGRES_PASSWORD:-postgres}"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9093:9092"
      - "29093:29092"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ─── Services ─────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      REDIS_USERNAME: "${REDIS_USERNAME:-}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_TLS_ENABLED: "${REDIS_TLS_ENABLED:-false}"
      REDIS_TLS_INSECURE_SKIP_VERIFY: "${REDIS_TLS_INSECURE_SKIP_VERIFY:-false}"
      REDIS_TLS_SERVER_NAME: "${REDIS_TLS_SERVER_NAME:-}"
      REDIS_CA_CERT_FILE: "${REDIS_CA_CERT_FILE:-}"
      REDIS_CLIENT_CERT_FILE: "${REDIS_CLIENT_CERT_FILE:-}"
      REDIS_CLIENT_KEY_FILE: "${REDIS_CLIENT_KEY_FILE:-}"
      KAFKA_TLS_ENABLED: "${KAFKA_TLS_ENABLED:-false}"
      KAFKA_TLS_INSECURE_SKIP_VERIFY: "${KAFKA_TLS_INSECURE_SKIP_VERIFY:-false}"
      KAFKA_TLS_SERVER_NAME: "${KAFKA_TLS_SERVER_NAME:-}"
      KAFKA_CA_CERT_FILE: "${KAFKA_CA_CERT_FILE:-}"
      KAFKA_CLIENT_CERT_FILE: "${KAFKA_CLIENT_CERT_FILE:-}"
      KAFKA_CLIENT_KEY_FILE: "${KAFKA_CLIENT_KEY_FILE:-}"
      KAFKA_SASL_MECHANISM: "${KAFKA_SASL_MECHANISM:-}"
      KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME:-}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD:-}"
      KAFKA_DIAL_TIMEOUT: "${KAFKA_DIAL_TIMEOUT:-10s}"
      HTTP_PORT: "8081"
      POSTGRES_DSN: "postgres://${IDENTITY_POSTGRES_USER:-postgres}:${IDENTITY_POSTGRES_PASSWORD:-postgres}@postgres:5432/identity_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "redpanda:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      REDIS_USERNAME: "${REDIS_USERNAME:-}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_TLS_ENABLED: "${REDIS_TLS_ENABLED:-false}"
      REDIS_TLS_INSECURE_SKIP_VERIFY: "${REDIS_TLS_INSECURE_SKIP_VERIFY:-false}"
      REDIS_TLS_SERVER_NAME: "${REDIS_TLS_SERVER_NAME:-}"
      REDIS_CA_CERT_FILE: "${REDIS_CA_CERT_FILE:-}"
      REDIS_CLIENT_CERT_FILE: "${REDIS_CLIENT_CERT_FILE:-}"
      REDIS_CLIENT_KEY_FILE: "${REDIS_CLIENT_KEY_FILE:-}"
      KAFKA_TLS_ENABLED: "${KAFKA_TLS_ENABLED:-false}"
      KAFKA_TLS_INSECURE_SKIP_VERIFY: "${KAFKA_TLS_INSECURE_SKIP_VERIFY:-false}"
      KAFKA_TLS_SERVER_NAME: "${KAFKA_TLS_SERVER_NAME:-}"
      KAFKA_CA_CERT_FILE: "${KAFKA_CA_CERT_FILE:-}"
      KAFKA_CLIENT_CERT_FILE: "${KAFKA_CLIENT_CERT_FILE:-}"
      KAFKA_CLIENT_KEY_FILE: "${KAFKA_CLIENT_KEY_FILE:-}"
      KAFKA_SASL_MECHANISM: "${KAFKA_SASL_MECHANISM:-}"
      KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME:-}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD:-}"
      KAFKA_DIAL_TIMEOUT: "${KAFKA_DIAL_TIMEOUT:-10s}"
      HTTP_PORT: "8082"
      POSTGRES_DSN: "postgres://${IDENTITY_POSTGRES_USER:-postgres}:${IDENTITY_POSTGRES_PASSWORD:-postgres}@postgres:5432/identity_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "redpanda:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  profile-service:
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      REDIS_USERNAME: "${REDIS_USERNAME:-}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_TLS_ENABLED: "${REDIS_TLS_ENABLED:-false}"
      REDIS_TLS_INSECURE_SKIP_VERIFY: "${REDIS_TLS_INSECURE_SKIP_VERIFY:-false}"
      REDIS_TLS_SERVER_NAME: "${REDIS_TLS_SERVER_NAME:-}"
      REDIS_CA_CERT_FILE: "${REDIS_CA_CERT_FILE:-}"
      REDIS_CLIENT_CERT_FILE: "${REDIS_CLIENT_CERT_FILE:-}"
      REDIS_CLIENT_KEY_FILE: "${REDIS_CLIENT_KEY_FILE:-}"
      KAFKA_TLS_ENABLED: "${KAFKA_TLS_ENABLED:-false}"
      KAFKA_TLS_INSECURE_SKIP_VERIFY: "${KAFKA_TLS_INSECURE_SKIP_VERIFY:-false}"
      KAFKA_TLS_SERVER_NAME: "${KAFKA_TLS_SERVER_NAME:-}"
      KAFKA_CA_CERT_FILE: "${KAFKA_CA_CERT_FILE:-}"
      KAFKA_CLIENT_CERT_FILE: "${KAFKA_CLIENT_CERT_FILE:-}"
      KAFKA_CLIENT_KEY_FILE: "${KAFKA_CLIENT_KEY_FILE:-}"
      KAFKA_SASL_MECHANISM: "${KAFKA_SASL_MECHANISM:-}"
      KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME:-}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD:-}"
      KAFKA_DIAL_TIMEOUT: "${KAFKA_DIAL_TIMEOUT:-10s}"
      HTTP_PORT: "8083"
      POSTGRES_DSN: "postgres://${IDENTITY_POSTGRES_USER:-postgres}:${IDENTITY_POSTGRES_PASSWORD:-postgres}@postgres:5432/identity_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "redpanda:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

volumes:
  pgdata:
