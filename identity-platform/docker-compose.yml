services:
  # ─── Infrastructure ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "PRvr@19910830"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9093:9092"
      - "29093:29092"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ─── Services ─────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      HTTP_PORT: "8081"
      POSTGRES_DSN: "postgres://postgres:PRvr%4019910830@postgres:5432/identity_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "redpanda:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      HTTP_PORT: "8082"
      POSTGRES_DSN: "postgres://postgres:PRvr%4019910830@postgres:5432/identity_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "redpanda:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  profile-service:
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      HTTP_PORT: "8083"
      POSTGRES_DSN: "postgres://postgres:PRvr%4019910830@postgres:5432/identity_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "redpanda:29092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

volumes:
  pgdata:
