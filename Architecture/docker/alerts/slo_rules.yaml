groups:
  - name: atpost_slo
    interval: 30s
    rules:
      - alert: AuthLoginLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="identity-auth"}[5m])) by (le)) > 0.5
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Auth login P99 latency > 500ms"
          description: "Identity auth service P99 response time has exceeded 500ms for 2 minutes."

      - alert: FeedLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="feed-service"}[5m])) by (le)) > 0.3
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Feed read P99 latency > 300ms"
          description: "Feed service P99 response time has exceeded 300ms for 2 minutes."

      - alert: PostCreateLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="post-service",method="POST"}[5m])) by (le)) > 1
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Post create P99 latency > 1s"
          description: "Post service write P99 has exceeded 1s for 2 minutes."

      - alert: NotificationFanoutLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="notification-service"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Notification fanout P99 > 2s"
          description: "Notification service P99 response time has exceeded 2s for 5 minutes."

      - alert: MediaTranscodeLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="media-service"}[5m])) by (le)) > 30
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Media transcode P99 > 30s"
          description: "Media service P99 (includes async transcode) has exceeded 30s for 10 minutes."

      - alert: ServiceErrorRateHigh
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) > 0.01
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.service }} error rate > 1%"
          description: "Service {{ $labels.service }} has a 5xx error rate above 1% for 2 minutes."

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumergroup_lag_sum > 10000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer group lag > 10000"
          description: "Consumer group {{ $labels.consumergroup }} has high lag on topic {{ $labels.topic }}."

      - alert: ChatMessageSendLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="chat-message-service",method="POST"}[5m])) by (le)) > 0.5
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Chat message send P99 > 500ms"
          description: "Chat message service write P99 has exceeded 500ms for 2 minutes."
