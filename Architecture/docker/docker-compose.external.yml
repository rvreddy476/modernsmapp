# ── External access overlay ──
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.external.yml up --build -d
#
# Prerequisites:
#   1. Point your domain DNS (A record) to your laptop's public IP
#   2. Forward ports 80 and 443 on your router to this machine
#   3. Set DOMAIN in your shell:  export DOMAIN=yourdomain.com
#
# Live streaming:
#   RTMP ingest requires direct TCP access (Cloudflare does not proxy port 1935).
#   Set LIVE_INGEST_HOST separately — your public IP or a DNS-only subdomain:
#     export LIVE_INGEST_HOST=rtmp.yourdomain.com   # or your public IP
#   If unset, defaults to DOMAIN (works only if port 1935 is directly reachable).
#   For the current cleestudio.com deployment, default ingest is rtmp.cleestudio.com.
#
# Caddy auto-provisions Let's Encrypt TLS certs — no manual SSL setup needed.
# WebRTC (getUserMedia) REQUIRES HTTPS, so this is mandatory for call testing.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-cleestudio.com}
    depends_on:
      - api-gateway
      - chat-ws-gateway
      - nextjs
    restart: unless-stopped

  nextjs:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run build && npm start"
    volumes:
      - ../../../postbook-ui:/app
    environment:
      NEXT_PUBLIC_API_BASE_URL: "https://${DOMAIN:-cleestudio.com}"
      NEXT_PUBLIC_WS_BASE_URL: "wss://${DOMAIN:-cleestudio.com}/v1/ws"
      API_GATEWAY_URL: "http://api-gateway:8080"
      CHAT_BACKEND_URL: "http://chat-message-service:8092/v1/chat"
      AUTH_SERVICE_URL: "http://identity-auth:8081"
      CHAT_PROXY_SIGNING_SECRET: "${JWT_SECRET:-local_dev_jwt_change_me}"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - chat-message-service
      - identity-auth

  # Override API gateway CORS to allow the domain
  api-gateway:
    environment:
      CORS_ORIGINS: "https://${DOMAIN:-cleestudio.com},http://localhost:3000"

  # Override WS gateway allowed origins
  chat-ws-gateway:
    environment:
      ALLOWED_ORIGINS: "https://${DOMAIN:-cleestudio.com},http://localhost:3000"

  # Override media public endpoint for external access
  media-service:
    environment:
      MINIO_PUBLIC_ENDPOINT: "https://${DOMAIN:-cleestudio.com}"

  live-service:
    environment:
      LIVE_PLAYBACK_URL_TEMPLATE: "https://${DOMAIN:-cleestudio.com}/v1/live/streams/{stream_id}/playback/index.m3u8"
      LIVE_PLAYBACK_INTERNAL_BASE_URL: "http://mediamtx:8888"
      LIVE_PLAYBACK_PROTOCOL: "hls"
      LIVE_PUBLISH_URL_TEMPLATE: "https://${DOMAIN:-cleestudio.com}/v1/live/streams/{stream_id}/publish/whip"
      LIVE_PUBLISH_INTERNAL_BASE_URL: "http://mediamtx:8889"
      LIVE_PUBLISH_PROTOCOL: "whip"
      LIVE_INGEST_URL: "rtmp://${LIVE_INGEST_HOST:-rtmp.cleestudio.com}:1935/live"
      LIVE_INGEST_PROTOCOL: "rtmp"

  mediamtx:
    environment:
      MTX_WEBRTCADDITIONALHOSTS: "${LIVE_WEBRTC_ADDITIONAL_HOSTS:-cleestudio.com,localhost,127.0.0.1}"

volumes:
  caddy_data:
  caddy_config:
