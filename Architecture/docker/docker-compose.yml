      # .secrets/ which is gitignored. Missing on the host = container
      # mount fails to start, which is the safe behavior.
      - ../../.secrets/firebase-cleestudio-2b06d.json:/run/secrets/firebase-key.json:ro
    depends_on:
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

