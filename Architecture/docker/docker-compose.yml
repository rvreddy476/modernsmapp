name: atpost_stack

x-postgres-dsns:
  identity: &identity_postgres_dsn postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/identity_db?sslmode=disable
  app: &app_postgres_dsn postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/app?sslmode=disable
  chat: &chat_postgres_dsn postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/chat_db?sslmode=disable
  call: &call_postgres_dsn postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/call_db?sslmode=disable
  commerce: &commerce_postgres_dsn postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/commerce_db?sslmode=disable

x-minio-creds:
  access_key: &minio_access_key ${MINIO_ACCESS_KEY:-minio}
  secret_key: &minio_secret_key ${MINIO_SECRET_KEY:-local_dev_minio_password_change_me}

x-redis-client-env: &redis_client_env
  REDIS_USERNAME: ${REDIS_USERNAME:-}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}
  REDIS_TLS_INSECURE_SKIP_VERIFY: ${REDIS_TLS_INSECURE_SKIP_VERIFY:-false}
  REDIS_TLS_SERVER_NAME: ${REDIS_TLS_SERVER_NAME:-}
  REDIS_CA_CERT_FILE: ${REDIS_CA_CERT_FILE:-}
  REDIS_CLIENT_CERT_FILE: ${REDIS_CLIENT_CERT_FILE:-}
  REDIS_CLIENT_KEY_FILE: ${REDIS_CLIENT_KEY_FILE:-}

x-kafka-client-env: &kafka_client_env
  KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-false}
  KAFKA_TLS_INSECURE_SKIP_VERIFY: ${KAFKA_TLS_INSECURE_SKIP_VERIFY:-false}
  KAFKA_TLS_SERVER_NAME: ${KAFKA_TLS_SERVER_NAME:-}
  KAFKA_CA_CERT_FILE: ${KAFKA_CA_CERT_FILE:-}
  KAFKA_CLIENT_CERT_FILE: ${KAFKA_CLIENT_CERT_FILE:-}
  KAFKA_CLIENT_KEY_FILE: ${KAFKA_CLIENT_KEY_FILE:-}
  KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
  KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
  KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
  KAFKA_DIAL_TIMEOUT: ${KAFKA_DIAL_TIMEOUT:-10s}

services:
  # ─── Shared Infrastructure ──────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/00-init-databases.sql:ro
      - ./database:/docker-entrypoint-initdb.d/database:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  scylla:
    image: scylladb/scylla:5.4
    command: ["--overprovisioned", "1", "--smp", "1", "--memory", "512M", "--developer-mode", "1"]
    ports:
      - "9042:9042"
    volumes:
      - scylladata:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' $(hostname -i) 9042 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  scylla-init:
    image: scylladb/scylla:5.4
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - ./scylla/schema.cql:/schema.cql:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "cqlsh scylla 9042 -f /schema.cql && echo 'Scylla schema applied'"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Phase F3 — Jaeger all-in-one for local W3C trace inspection.
  # OTLP receivers: 4317 (gRPC) and 4318 (HTTP). The trace package
  # auto-maps :4318 → :4317 so existing OTEL_EXPORTER_OTLP_ENDPOINT
  # values keep working. Open http://localhost:16686 to view traces.
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: atpost_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  redpanda-init:
    image: redpandadata/redpanda:latest
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:9092
    volumes:
      - ./init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  redpanda-console:
    image: redpandadata/console:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8085:8080"
    depends_on:
      - redpanda
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local_dev_minio_password_change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-LocalDev@OpenSearch2024}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ─── API Gateway ────────────────────────────────────────────

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      HTTP_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_change_me}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      AUTH_SERVICE_URL: http://identity-auth:8081
      CALL_SERVICE_URL: http://call-service:8097
      USER_SERVICE_URL: http://user-service:8082
      GRAPH_SERVICE_URL: http://graph-service:8083
      POST_SERVICE_URL: http://post-service:8084
      FEED_SERVICE_URL: http://feed-service:8086
      MEDIA_SERVICE_URL: http://media-service:8087
      NOTIFY_SERVICE_URL: http://notification-service:8088
      SEARCH_SERVICE_URL: http://search-service:8089
      MONETIZATION_SERVICE_URL: http://monetization-service:8099
      TRUST_SAFETY_SERVICE_URL: http://trust-safety-service:8091
      MESSAGE_SERVICE_URL: http://chat-message-service:8092
      ANALYTICS_SERVICE_URL: http://analytics-service:8094
      AI_SERVICE_URL: http://ai-service:8117
      FLAGS_SERVICE_URL: http://feature-flag-service:8095
      GROUP_SERVICE_URL: http://group-service:8090
      ADMIN_SERVICE_URL: http://admin-service:8096
      PROFILE_SERVICE_URL: http://identity-profile:8098
      PAYMENTS_SERVICE_URL: http://payments-service:8102
      LIVE_SERVICE_URL: http://live-service:8103
      LIVE_V2_SERVICE_URL: http://live-service-v2:8117
      MEMORIES_SERVICE_URL: http://memories-service:8104
      CHANNEL_SERVICE_URL: http://channel-service:8106
      COMMUNITY_SERVICE_URL: http://community-service:8107
      QA_SERVICE_URL: http://qa-service:8108
      COMMERCE_SERVICE_URL: http://commerce-service:8109
      DATING_SERVICE_URL: http://dating-service:8112
      FOOD_SERVICE_URL: http://food-service:8113
      WALLET_SERVICE_URL: http://wallet-service:8114
      BILL_PAY_SERVICE_URL: http://bill-pay-service:8115
      RIDER_SERVICE_URL: http://rider-service:8116
    ports:
      - "8080:8080"
    depends_on:
      - identity-auth
      - user-service
      - post-service
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ─── Identity Platform Services ─────────────────────────────

  identity-auth:
    build:
      context: ../../identity-platform
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8081"
      POSTGRES_DSN: *identity_postgres_dsn
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_change_me}
      RATE_LIMIT_ENABLED: "false"
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      # Dev: tokens never expire — no more surprise logouts
      ACCESS_TOKEN_TTL: "8760h"
      REFRESH_TOKEN_TTL: "87600h"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  identity-user:
    build:
      context: ../../identity-platform
      dockerfile: services/user-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8110"
      POSTGRES_DSN: *identity_postgres_dsn
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      # JWT_SECRET must match auth-service; otherwise tokens validate at
      # the gateway but get rejected here → 401 → UI clears session →
      # "Authorization Required" on /settings/profile even after a fresh
      # login.
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_change_me}
      # Gates /v1/users/* (incl. the privacy-settings endpoint the graph
      # permission resolver reads). The api-gateway injects this key.
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
    ports:
      - "8110:8110"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  identity-profile:
    build:
      context: ../../identity-platform
      dockerfile: services/profile-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8098"
      POSTGRES_DSN: *identity_postgres_dsn
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_change_me}
    ports:
      - "8098:8098"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ─── Architecture Services ──────────────────────────────────

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8082"
      POSTGRES_DSN: *app_postgres_dsn
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
      PROFILE_SERVICE_URL: http://identity-profile:8098
      PAGES_ADMIN_USER_IDS: ${PAGES_ADMIN_USER_IDS:-c52b44aa-c75f-4843-98fa-2225041a5e00}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  graph-service:
    build:
      context: ..
      dockerfile: services/graph-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8083"
      POSTGRES_DSN: *app_postgres_dsn
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
      # Permission resolver reads privacy settings from the identity user-service.
      USER_SERVICE_URL: http://identity-user:8110
      # Read-through projection repair targets the app.users-owning user-service.
      APP_USER_SERVICE_URL: http://user-service:8082
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  group-service:
    build:
      context: ..
      dockerfile: services/group-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8090"
      POSTGRES_DSN: *app_postgres_dsn
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      MESSAGE_SERVICE_URL: http://chat-message-service:8092
      POST_SERVICE_URL: http://post-service:8084
      # Audit CG4: group-service now refuses boot when JWT_SECRET is
      # unset (previously defaulted to the literal "dev_secret_change_me").
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_change_me}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  post-service:
    build:
      context: ..
      dockerfile: services/post-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8084"
      POSTGRES_DSN: *app_postgres_dsn
      SCYLLA_HOSTS: scylla
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      USER_SERVICE_URL: http://identity-user:8110
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      # Migration runner baseline knob — leave default ("false") so new migration
      # files added to database/migrations/ get applied on next boot. Set to
      # "true" only when adopting the runner against an existing DB whose
      # migrations were applied out-of-band; the first such boot marks them
      # as applied without executing. (One-shot, see migrationrunner package.)
      SCHEMA_MIGRATIONS_BASELINE: ${SCHEMA_MIGRATIONS_BASELINE:-false}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  feed-service:
    build:
      context: ..
      dockerfile: services/feed-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8086"
      POSTGRES_DSN: *app_postgres_dsn
      SCYLLA_HOSTS: scylla
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      GRAPH_SERVICE_URL: http://graph-service:8083
      # Reads tc_close_friends_posts to gate close-friends ("trusted") fanout.
      USER_SERVICE_URL: http://identity-user:8110
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  media-service:
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8087"
      POSTGRES_DSN: *app_postgres_dsn
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_change_me}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-https://cleestudio.com}
      MINIO_ACCESS_KEY: *minio_access_key
      MINIO_SECRET_KEY: *minio_secret_key
      MINIO_BUCKET: media
      KAFKA_BROKERS: redpanda:9092
      MEDIA_SCANNER_ENABLED: ${MEDIA_SCANNER_ENABLED:-false}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-local_dev_internal_service_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      REDIS_ADDR: redis:6379
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  media-worker:
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile.worker
    environment:
      <<: [*kafka_client_env]
      POSTGRES_DSN: *app_postgres_dsn
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: *minio_access_key
      MINIO_SECRET_KEY: *minio_secret_key
      MINIO_BUCKET: media
      KAFKA_BROKERS: redpanda:9092
      MEDIA_SCANNER_ENABLED: ${MEDIA_SCANNER_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  mediamtx:
    image: bluenviron/mediamtx:latest
    command: ["/mediamtx.yml"]
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_WEBRTCADDITIONALHOSTS: ${LIVE_WEBRTC_ADDITIONAL_HOSTS:-localhost,127.0.0.1}
    ports:
      - "1935:1935"
      - "8189:8189/tcp"
      - "8189:8189/udp"
    expose:
      - "8888"
      - "8889"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    environment:
      <<: [*redis_client_env, *kafka_client_env]
      HTTP_PORT: "8088"
      SCYLLA_HOSTS: scylla
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      # FCM push (Firebase HTTP v1) — leave blank to disable push in dev
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVICE_ACCOUNT_KEY: ${FCM_SERVICE_ACCOUNT_KEY:-}
      # APNs push (iOS) — leave blank to disable push in dev
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_PRIVATE_KEY_PATH: ${APNS_PRIVATE_KEY_PATH:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
