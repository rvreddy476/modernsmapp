name: atpost_stack

services:
  # ─── Shared Infrastructure ──────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scylla:
    image: scylladb/scylla:5.4
    command: ["--overprovisioned", "1", "--smp", "1", "--memory", "2048M"]
    ports:
      - "9042:9042"
    volumes:
      - scylladata:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' $(hostname -i) 9042 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30

  scylla-init:
    image: scylladb/scylla:5.4
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - ./scylla/schema.cql:/schema.cql:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "cqlsh scylla 9042 -f /schema.cql && echo 'Scylla schema applied'"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  redpanda-console:
    image: redpandadata/console:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8085:8080"
    depends_on:
      - redpanda

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "S3cure@Dev#2026"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  # ─── API Gateway ────────────────────────────────────────────

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      HTTP_PORT: "8080"
      CORS_ORIGINS: "http://localhost:3000"
      AUTH_SERVICE_URL: http://identity-auth:8081
      USER_SERVICE_URL: http://user-service:8082
      GRAPH_SERVICE_URL: http://graph-service:8083
      POST_SERVICE_URL: http://post-service:8084
      FEED_SERVICE_URL: http://feed-service:8086
      MEDIA_SERVICE_URL: http://media-service:8087
      NOTIFY_SERVICE_URL: http://notification-service:8088
      SEARCH_SERVICE_URL: http://search-service:8089
      MONETIZATION_SERVICE_URL: http://monetization-service:8099
      TRUST_SAFETY_SERVICE_URL: http://trust-safety-service:8091
      MESSAGE_SERVICE_URL: http://chat-message-service:8092
      ANALYTICS_SERVICE_URL: http://analytics-service:8094
      FLAGS_SERVICE_URL: http://feature-flag-service:8095
      GROUP_SERVICE_URL: http://group-service:8090
      ADMIN_SERVICE_URL: http://admin-service:8096
      PROFILE_SERVICE_URL: http://identity-profile:8098
      ORDERS_SERVICE_URL: http://orders-service:8101
      PAYMENTS_SERVICE_URL: http://payments-service:8102
      SHOP_SERVICE_URL: http://shop-service:8105
      LIVE_SERVICE_URL: http://live-service:8103
      MEMORIES_SERVICE_URL: http://memories-service:8104
    ports:
      - "8080:8080"
    depends_on:
      - identity-auth
      - user-service
      - post-service

  # ─── Identity Platform Services ─────────────────────────────

  identity-auth:
    build:
      context: ../../identity-platform
      dockerfile: services/auth-service/Dockerfile
    environment:
      HTTP_PORT: "8081"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/identity_db?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      RATE_LIMIT_ENABLED: "true"
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-user:
    build:
      context: ../../identity-platform
      dockerfile: services/user-service/Dockerfile
    environment:
      HTTP_PORT: "8097"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/identity_db?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8097:8097"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-profile:
    build:
      context: ../../identity-platform
      dockerfile: services/profile-service/Dockerfile
    environment:
      HTTP_PORT: "8098"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/identity_db?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8098:8098"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Architecture Services ──────────────────────────────────

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    environment:
      HTTP_PORT: "8082"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started

  graph-service:
    build:
      context: ..
      dockerfile: services/graph-service/Dockerfile
    environment:
      HTTP_PORT: "8083"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started

  group-service:
    build:
      context: ..
      dockerfile: services/group-service/Dockerfile
    environment:
      HTTP_PORT: "8090"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      REDIS_ADDR: redis:6379
      MESSAGE_SERVICE_URL: http://chat-message-service:8092
      POST_SERVICE_URL: http://post-service:8084
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  post-service:
    build:
      context: ..
      dockerfile: services/post-service/Dockerfile
    environment:
      HTTP_PORT: "8084"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      SCYLLA_HOSTS: scylla
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      USER_SERVICE_URL: http://identity-user:8097
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started

  feed-service:
    build:
      context: ..
      dockerfile: services/feed-service/Dockerfile
    environment:
      HTTP_PORT: "8086"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      SCYLLA_HOSTS: scylla
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      GRAPH_SERVICE_URL: http://graph-service:8083
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started

  media-service:
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile
    environment:
      HTTP_PORT: "8087"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      JWT_SECRET: dev_secret_change_me
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: media
      KAFKA_BROKERS: redpanda:9092
      MEDIA_SCANNER_ENABLED: ${MEDIA_SCANNER_ENABLED:-false}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redpanda:
        condition: service_started

  media-worker:
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile.worker
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: media
      KAFKA_BROKERS: redpanda:9092
      MEDIA_SCANNER_ENABLED: ${MEDIA_SCANNER_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redpanda:
        condition: service_started

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    environment:
      HTTP_PORT: "8088"
      SCYLLA_HOSTS: scylla
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      # FCM push (Firebase HTTP v1) — leave blank to disable push in dev
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVICE_ACCOUNT_KEY: ${FCM_SERVICE_ACCOUNT_KEY:-}
      # APNs push (iOS) — leave blank to disable push in dev
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_PRIVATE_KEY_PATH: ${APNS_PRIVATE_KEY_PATH:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8088:8088"
    depends_on:
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started

  search-service:
    build:
      context: ..
      dockerfile: services/search-service/Dockerfile
    environment:
      HTTP_PORT: "8089"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      OPENSEARCH_URL: http://opensearch:9200
      KAFKA_BROKERS: redpanda:9092
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_started
      redpanda:
        condition: service_started

  trust-safety-service:
    build:
      context: ..
      dockerfile: services/trust-safety-service/Dockerfile
    environment:
      HTTP_PORT: "8091"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  # ─── Chat Service (independent) ─────────────────────────────

  chat-message-service:
    build:
      context: ../../chat-service
      dockerfile: services/message-service/Dockerfile
    environment:
      HTTP_PORT: "8092"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/chat_db?sslmode=disable
      SCYLLA_HOSTS: scylla
      SCYLLA_KEYSPACE: chatservice
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: chat.events.v1
      JWT_SECRET: dev_secret_change_me
      IDENTITY_KAFKA_TOPIC: identity.events.v1
      IDENTITY_KAFKA_GROUP_ID: chat-service-identity
      GRAPH_SERVICE_URL: http://graph-service:8083
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
      graph-service:
        condition: service_started

  chat-ws-gateway:
    build:
      context: ../../chat-service
      dockerfile: services/ws-gateway/Dockerfile
    environment:
      HTTP_PORT: "8093"
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev_secret_change_me
      ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8093:8093"
    depends_on:
      redis:
        condition: service_healthy

  monetization-service:
    build:
      context: ..
      dockerfile: services/monetization-service/Dockerfile
    environment:
      HTTP_PORT: "8099"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8099:8099"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build:
      context: ..
      dockerfile: services/analytics-service/Dockerfile
    environment:
      HTTP_PORT: "8094"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      REDIS_ADDR: redis:6379
      SCYLLA_HOSTS: scylla
      KAFKA_BROKERS: redpanda:9092
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8094:8094"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      redpanda:
        condition: service_started

  feature-flag-service:
    build:
      context: ..
      dockerfile: services/feature-flag-service/Dockerfile
    environment:
      HTTP_PORT: "8095"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8095:8095"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-service:
    build:
      context: ..
      dockerfile: services/admin-service/Dockerfile
    environment:
      HTTP_PORT: "8096"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8096:8096"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  # ─── Commerce Services (v2.1) ────────────────────────────────

  orders-service:
    build:
      context: ..
      dockerfile: services/orders-service/Dockerfile
    environment:
      HTTP_PORT: "8101"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/commerce_db?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
      PAYMENTS_SERVICE_URL: http://payments-service:8102
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
    ports:
      - "8101:8101"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  payments-service:
    build:
      context: ..
      dockerfile: services/payments-service/Dockerfile
    environment:
      HTTP_PORT: "8102"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/commerce_db?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
      # Razorpay credentials — omit to use StubGateway in dev
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-dev_internal_key_change_me}
    ports:
      - "8102:8102"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  suggestion-service:
    build:
      context: ..
      dockerfile: services/suggestion-service/Dockerfile
    environment:
      HTTP_PORT: "8100"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      IDENTITY_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/identity_db?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: redpanda:9092
      SCYLLA_HOSTS: scylla
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
      scylla-init:
        condition: service_completed_successfully

  shop-service:
    build:
      context: ..
      dockerfile: services/shop-service/Dockerfile
    environment:
      HTTP_PORT: "8105"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/commerce_db?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8105:8105"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  live-service:
    build:
      context: ..
      dockerfile: services/live-service/Dockerfile
    environment:
      HTTP_PORT: "8103"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8103:8103"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  memories-service:
    build:
      context: ..
      dockerfile: services/memories-service/Dockerfile
    environment:
      HTTP_PORT: "8104"
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/app?sslmode=disable
    ports:
      - "8104:8104"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
  scylladata:
