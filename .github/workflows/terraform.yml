name: Terraform

# Two layers:
#  1) validate  — runs on every PR/push touching infra/terraform. fmt + validate
#     only (init -backend=false), so it needs NO AWS creds and gates HCL errors.
#  2) plan-apply — MANUAL (workflow_dispatch). Pick environment + command
#     (plan|apply). Uses GitHub-OIDC into a privileged Terraform role and the S3
#     backend. Never runs automatically — no unattended applies.
#
# Required for plan-apply (repo settings):
#   secret AWS_TERRAFORM_ROLE_ARN   — role with permissions to manage the stack
#   var    TF_STATE_BUCKET          — atpost-tfstate-<account-id>
#   var    TF_LOCK_TABLE            — atpost-tfstate-locks
#   a non-secret envs/<env>/<env>.tfvars (or TF_VAR_* env) supplying the
#   required variables (github_repos, cluster CIDRs, tfstate arns, …).

on:
  pull_request:
    paths: ["infra/terraform/**", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["infra/terraform/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Which env"
        type: choice
        options: [staging, prod]
        default: staging
      command:
        description: "plan or apply"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  contents: read
  id-token: write # OIDC (only used by plan-apply)

jobs:
  validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: init (no backend) + validate
        run: |
          terraform -chdir=infra/terraform/envs/${{ matrix.env }} init -backend=false -input=false
          terraform -chdir=infra/terraform/envs/${{ matrix.env }} validate

  plan-apply:
    name: ${{ github.event.inputs.command }} (${{ github.event.inputs.environment }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }} # enables required reviewers
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-south-1
      - name: init (S3 backend)
        working-directory: infra/terraform/envs/${{ github.event.inputs.environment }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=envs/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=ap-south-1" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
      - name: ${{ github.event.inputs.command }}
        working-directory: infra/terraform/envs/${{ github.event.inputs.environment }}
        run: |
          VARFILE=""
          [ -f "${{ github.event.inputs.environment }}.tfvars" ] && VARFILE="-var-file=${{ github.event.inputs.environment }}.tfvars"
          if [ "${{ github.event.inputs.command }}" = "apply" ]; then
            terraform apply -input=false -auto-approve $VARFILE
          else
            terraform plan -input=false -no-color $VARFILE
          fi
