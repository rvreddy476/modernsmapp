name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Sunday 02:00 UTC — keeps govulncheck/Trivy current without
    # blocking every PR on slow scans.
    - cron: '0 2 * * 0'

jobs:
  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  govulncheck:
    name: govulncheck (${{ matrix.workdir }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        workdir:
          - Architecture
          - identity-platform/services/auth-service
          - identity-platform/services/user-service
          - identity-platform/services/profile-service
          - chat-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: install
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan
        run: cd ${{ matrix.workdir }} && govulncheck ./...

  trivy-fs:
    name: trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
