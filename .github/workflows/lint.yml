name: Lint

on:
  pull_request:
    paths:
      - 'Architecture/**'
      - 'identity-platform/**'
      - 'chat-service/**'
      - '.github/workflows/lint.yml'
      - '.golangci.yml'

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        workdir:
          - Architecture
          - identity-platform/services/auth-service
          - identity-platform/services/user-service
          - identity-platform/services/profile-service
          - chat-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: ${{ matrix.workdir }}
          args: --timeout=10m
