# Defaults for the atpost-service chart. Override per-service via the
# deploy/services/<svc>/values-{staging,prod}.yaml files.
#
# Anything UNSET here that must be set per-service is annotated
# `# REQUIRED` so a missing value fails the helm template render
# instead of producing a malformed manifest.

# Service identity.
service:
  name: ""          # REQUIRED. lower-kebab name e.g. "post-service"
  port: 0           # REQUIRED. e.g. 8084 for post-service

# Image. tag is the only field CI rewrites per push; everything else
# is stable.
image:
  repository: ""    # REQUIRED. e.g. "<account>.dkr.ecr.<region>.amazonaws.com/atpost/post-service"
  tag: ""           # REQUIRED. set by CI — never hand-edit; commit SHA.
  pullPolicy: IfNotPresent

replicaCount: 3

# Pod resources. The defaults are sized for a stateless Go service
# on the general node group; data-heavy services (post, search,
# media) override these.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal Pod Autoscaler. enabled=false for non-prod by default.
hpa:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Node placement. Default = general node group. Override to "memory"
# for Scylla-adjacent workloads if they ever need to co-locate.
nodeSelector:
  workload: general
tolerations: []

# Container runtime user. The images don't set a USER, so the chart pins a
# non-root UID here to satisfy runAsNonRoot. Override per-service if an image
# needs a specific uid/gid.
securityContext:
  runAsUser: 1000
  runAsGroup: 1000

# Service-account-bound IAM role (IRSA). Set to a role ARN when the
# service needs AWS API access (S3, MSK IAM auth, etc.). Empty =
# service-account with no AWS permissions.
serviceAccount:
  create: true
  irsaRoleArn: ""   # arn:aws:iam::<account>:role/atpost-<env>-<svc>-irsa

# Environment variables. Two paths:
#   env       inline literal values (PORT, FEATURE_FLAGS, etc.)
#   envFrom   reference a kubernetes Secret/ConfigMap (DB creds via ESO)
env: {}
envFrom: []

# Standard atpost env vars wired by the chart automatically (HTTP_PORT
# from service.port, etc.) so per-service values don't repeat them.

# ExternalSecret — pulls a secret from AWS Secrets Manager via the
# external-secrets operator. Set externalSecret.enabled=true and list
# the keys you want exposed as env vars.
externalSecret:
  enabled: false
  refreshInterval: 1h
  secretStoreName: aws-secrets-manager
  remoteKey: ""     # e.g. atpost/staging/post-service. REQUIRED when enabled.
  # data: list of remote keys → kubernetes Secret data fields.
  # The chart auto-mounts the resulting Secret as envFrom secretRef.
  data: []          # [{ secretKey: "DB_PASSWORD", remoteRef: "password" }]

# Ingress. enabled=false for internal services (most of them). The
# api-gateway is the canonical external entry point; everything else
# stays in-cluster.
ingress:
  enabled: false
  className: alb
  annotations: {}
  hosts: []
  tls: []

# Prometheus ServiceMonitor — scrapes /metrics when monitoring stack
# is installed. enabled=true by default since every service we ship
# exposes /metrics.
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s

# Liveness + readiness probes. The shared/health package's defaults
# expose /livez and /readyz on the same port as the HTTP service.
livenessProbe:
  path: /livez
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  path: /readyz
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

# PodDisruptionBudget so cluster maintenance can't take all replicas.
pdb:
  enabled: true
  minAvailable: 2   # tighten to maxUnavailable: 25% for large services
