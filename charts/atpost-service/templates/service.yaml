apiVersion: v1
kind: Service
metadata:
  name: {{ include "atpost-service.name" . }}
  labels:
    {{- include "atpost-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "atpost-service.selectorLabels" . | nindent 4 }}
