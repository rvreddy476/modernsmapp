{{- if .Values.externalSecret.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "atpost-service.name" . }}
  labels:
    {{- include "atpost-service.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: ClusterSecretStore
  target:
    # The Secret name matches the release name so the Deployment's
    # envFrom: secretRef.name picks it up without an extra override.
    name: {{ include "atpost-service.name" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.externalSecret.remoteKey }}
        property: {{ .remoteRef }}
    {{- end }}
{{- end }}
