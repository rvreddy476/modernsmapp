org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# tflite_flutter (3rd-party) compiles Java at 11 but Kotlin at 17, tripping
# Kotlin's strict inter-task JVM-target check and failing the Android build. We
# don't control that plugin, so downgrade the check to a warning (Kotlin's
# documented escape hatch). Our own app module is aligned at 17/17.
kotlin.jvm.target.validation.mode=warning
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
