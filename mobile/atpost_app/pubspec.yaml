name: atpost_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  flutter_riverpod: ^2.6.1
  go_router: ^16.3.0
  dio: ^5.9.0
  web_socket_channel: ^3.0.3
  video_player: ^2.10.2
  chewie: ^1.13.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.2
  flutter_animate: ^4.5.2
  flutter_webrtc: ^1.4.0
  livekit_client: ^2.7.2
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.2
  fl_chart: ^0.69.0
  webview_flutter: ^4.10.1
  mime: ^1.0.6

  # Razorpay — commerce payment SDK (Phase 1.4 of the commerce program).
  # Release builds use this; dev builds may fall back to the stub adapter
  # gated by EnvFlags.allowStubPayments AND kDebugMode (see razorpay_commerce.dart).
  razorpay_flutter: ^1.3.7

  # Creative Studio — Video Editor
  camera: ^0.10.5+9
  face_verification: ^0.3.6
  google_mlkit_face_detection: ^0.13.2
  just_audio: ^0.9.40
  video_thumbnail: ^0.5.3
  colorfilter_generator: ^0.0.8
  geolocator: ^12.0.0
  google_maps_flutter: ^2.12.3

  # Offline caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3
  mocktail: ^1.0.4
  webview_flutter_platform_interface: ^2.15.1

flutter:
  uses-material-design: true
