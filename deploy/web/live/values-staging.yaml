# web zone "live" (/live) — staging. Reuses charts/atpost-service.
service:
  name: web-live
  port: 3000            # Next standalone listens on 3000
image:
  repository: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/atpost/web-live
  tag: latest           # CI overrides with the commit SHA
replicaCount: 2
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 65
resources:
  requests: { cpu: 100m, memory: 192Mi }
  limits: { cpu: 1, memory: 768Mi }
env:
  HOSTNAME: 0.0.0.0
  PORT: "3000"
  NODE_ENV: production
  # Server-side proxy/refresh targets (cluster-internal):
  API_GATEWAY_URL: http://api-gateway.atpost.svc.cluster.local:8080
  AUTH_SERVICE_URL: http://identity-auth-service.atpost.svc.cluster.local:8081
  # Browser axios base = this zone's basePath (Multi-Zones edge routes it here):
  NEXT_PUBLIC_API_BASE_URL: "/live"
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: atpost-web-staging   # all zones share ONE ALB
    alb.ingress.kubernetes.io/group.order: "10"          # shell (/) is the catch-all, evaluated last
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /live
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:123456789012:certificate/CHANGEME
  hosts:
    - host: app.staging.cleestudio.com
      paths:
        - { path: /live, pathType: Prefix }
pdb:
  enabled: false
  minAvailable: 1
