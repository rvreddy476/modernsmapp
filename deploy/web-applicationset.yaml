# ApplicationSet for the web monorepo zones (atpost-web). One ArgoCD Application
# per directory under deploy/web/*, deployed with the shared charts/atpost-service
# chart + that zone's values-<env>.yaml. Images are built from the atpost-web
# repo and pushed to ECR (atpost/web-<zone>); these manifests just deploy them.
#
# Mirrors deploy/argocd/applicationset.yaml (backend services): staging tracks
# main + auto-syncs; prod tracks release/prod.

# ─── Staging ───────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: atpost-web-staging
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/rvreddy476/modernsmapp.git
        revision: main
        directories:
          - path: deploy/web/*
  template:
    metadata:
      name: 'web-staging-{{.path.basename}}'
      labels:
        app.kubernetes.io/part-of: atpost-web
        atpost.io/env: staging
        atpost.io/zone: '{{.path.basename}}'
    spec:
      project: atpost
      sources:
        - repoURL: https://github.com/rvreddy476/modernsmapp.git
          targetRevision: main
          path: charts/atpost-service
          helm:
            valueFiles:
              - $values/{{.path.path}}/values-staging.yaml
        - repoURL: https://github.com/rvreddy476/modernsmapp.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: atpost-web
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

---
# ─── Prod ──────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: atpost-web-prod
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/rvreddy476/modernsmapp.git
        revision: release/prod
        directories:
          - path: deploy/web/*
  template:
    metadata:
      name: 'web-prod-{{.path.basename}}'
      labels:
        app.kubernetes.io/part-of: atpost-web
        atpost.io/env: prod
        atpost.io/zone: '{{.path.basename}}'
    spec:
      project: atpost
      sources:
        - repoURL: https://github.com/rvreddy476/modernsmapp.git
          targetRevision: release/prod
          path: charts/atpost-service
          helm:
            valueFiles:
              - $values/{{.path.path}}/values-prod.yaml
        - repoURL: https://github.com/rvreddy476/modernsmapp.git
          targetRevision: release/prod
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: atpost-web
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
