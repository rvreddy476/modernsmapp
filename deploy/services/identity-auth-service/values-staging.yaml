# identity-auth-service overrides for the staging environment.
#
# The atpost-service chart owns Deployment / Service / SA / ESO /
# HPA / PDB / ServiceMonitor. Anything not listed here inherits the
# chart default. CI rewrites image.tag on every push to main; never
# hand-edit it.

service:
  name: identity-auth-service
  port: 8081

image:
  repository: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/atpost/identity-auth-service
  tag: latest # CI overrides via --set image.tag=<sha>

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  irsaRoleArn: arn:aws:iam::123456789012:role/atpost-staging-identity-auth-service-irsa

externalSecret:
  enabled: true
  remoteKey: atpost/staging/identity-auth-service
  data:
    - { secretKey: DATABASE_URL, remoteRef: postgres_dsn }
    - { secretKey: REDIS_ADDR, remoteRef: redis_addr }
    - { secretKey: REDIS_PASSWORD, remoteRef: redis_password }
    - { secretKey: KAFKA_BROKERS, remoteRef: kafka_brokers }
    - { secretKey: INTERNAL_SERVICE_KEY, remoteRef: internal_service_key }
    - { secretKey: JWT_SECRET, remoteRef: jwt_secret }
    - { secretKey: JWT_KID, remoteRef: jwt_kid }
    # RS256 access-token signing (private key). Test RS256 here before prod.
    - { secretKey: JWT_PRIVATE_KEY_PEM, remoteRef: jwt_private_key_pem }

env:
  ENV: staging
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.observability.svc.cluster.local:4318
  JWT_RS256_KID: rsa-1
  # RBAC bootstrap — set the staging superadmin UUID(s) to exercise /admin/access.
  SUPERADMIN_USER_IDS: ""  # CHANGEME
  ADMIN_USER_IDS: ""
  MODERATOR_USER_IDS: ""
  REQUIRE_MFA_FOR_PRIVILEGED: "false"  # staging convenience; on in prod

# Internal-only — api-gateway is the external surface.
ingress:
  enabled: false
