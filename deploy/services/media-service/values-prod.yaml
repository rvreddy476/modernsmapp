# media-service overrides for the prod environment.

service:
  name: media-service
  port: 8087

image:
  repository: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/atpost/media-service
  tag: latest # CI overrides via --set image.tag=<sha>

replicaCount: 3
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 65

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1500m
    memory: 1Gi

serviceAccount:
  irsaRoleArn: arn:aws:iam::123456789012:role/atpost-prod-media-service-irsa

externalSecret:
  enabled: true
  remoteKey: atpost/prod/media-service
  data:
    - { secretKey: INTERNAL_SERVICE_KEY, remoteRef: internal_service_key }
    - { secretKey: JWT_SECRET, remoteRef: jwt_secret }
    - { secretKey: JWT_KID, remoteRef: jwt_kid }
    - { secretKey: JWT_SECRET_PREVIOUS, remoteRef: jwt_secret_previous }
    - { secretKey: JWT_KID_PREVIOUS, remoteRef: jwt_kid_previous }
    # RS256 verification (public key); HS256 stays accepted in parallel.
    - { secretKey: JWT_PUBLIC_KEY_PEM, remoteRef: jwt_public_key_pem }

env:
  ENV: prod
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.observability.svc.cluster.local:4318
  # RS256 key id — must match auth-service's JWT_RS256_KID.
  JWT_RS256_KID: rsa-1

ingress:
  enabled: false

pdb:
  enabled: true
  minAvailable: 2
