# payments-service overrides for the prod environment.

service:
  name: payments-service
  port: 8102

image:
  repository: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/atpost/payments-service
  tag: latest # CI overrides via --set image.tag=<sha>

replicaCount: 3
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 65

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1500m
    memory: 1Gi

serviceAccount:
  irsaRoleArn: arn:aws:iam::123456789012:role/atpost-prod-payments-service-irsa

externalSecret:
  enabled: true
  remoteKey: atpost/prod/payments-service
  data:
    - { secretKey: INTERNAL_SERVICE_KEY, remoteRef: internal_service_key }
    - { secretKey: JWT_SECRET, remoteRef: jwt_secret }
    - { secretKey: JWT_KID, remoteRef: jwt_kid }
    - { secretKey: JWT_SECRET_PREVIOUS, remoteRef: jwt_secret_previous }
    - { secretKey: JWT_KID_PREVIOUS, remoteRef: jwt_kid_previous }

env:
  ENV: prod
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.observability.svc.cluster.local:4318

ingress:
  enabled: false

pdb:
  enabled: true
  minAvailable: 2
